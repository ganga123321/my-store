<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <div class="card">
      <img src="product.png" alt="Creatine">

      <h2>MuscleBlaze CreaPRO Creatine</h2>
      <p class="price">₹749 <span>₹799</span></p>
      <p class="rating">⭐ 4.3 Rating</p>
      <p class="offer">Buy 3 items, save extra ₹100</p>

      <button onclick="buyNow()">Buy Now</button>
      <button onclick="addToCart()">Add to Cart</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
